        <div class="container px-5">
            <a class="navbar-brand" href="index.html">Rick Grisales</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 small fw-bolder">
                    <li class="nav-item"><a class="nav-link" href="index.html" data-es="Home" data-en="Home">Home</a></li>

                </ul>
            </div>
        </div>
    </nav>

    <section class="py-5">
        <div class="container px-5">
            <div class="section-header mb-5">
                <span class="label-tag" data-es="Contacto" data-en="Contact">Contacto</span>
                <h1 class="section-title" data-es="Hablemos" data-en="Let's talk">Hablemos</h1>
            </div>

            <div class="contact-form-wrap">
                <p style="font-size:0.95rem; color:var(--muted-text-color); line-height:1.75; margin-bottom:2rem;">
                    Proyectos, colaboraciones, ideas o lo que sea urgente. Si algo que lees aquí te mueve, escribe.
                </p>
                <form action="https://formsubmit.co/oranrick@gmail.com" method="POST">
                    <div class="mb-3">
                        <label for="name" style="font-family:'DM Mono',monospace;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted-text-color);display:block;margin-bottom:0.4rem;" data-es="Nombre" data-en="Name">Nombre</label>
                        <input class="form-control" id="name" name="name" type="text" placeholder="Tu nombre" required />
                    </div>
                    <div class="mb-3">
                        <label for="email" style="font-family:'DM Mono',monospace;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted-text-color);display:block;margin-bottom:0.4rem;" data-es="Correo" data-en="Email">Correo</label>
                        <input class="form-control" id="email" name="email" type="email" placeholder="tu@email.com" required />
                    </div>
                    <div class="mb-3">
                        <label for="message" style="font-family:'DM Mono',monospace;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted-text-color);display:block;margin-bottom:0.4rem;" data-es="Mensaje" data-en="Message">Mensaje</label>
                        <textarea class="form-control" id="message" name="message" placeholder="Tu mensaje" style="height:9rem;" required></textarea>
                    </div>
                    <input type="hidden" name="_next" value="https://oranrick.netlify.app/gracias.html">
                    <input type="hidden" name="_captcha" value="false">
                    <div class="mt-4">
                        <button class="btn btn-primary btn-lg px-5 py-3 fs-6 fw-bolder" type="submit" data-es="Enviar" data-en="Send">Enviar</button>
                    </div>
                </form>
            </div>
        </div>
    </section>

</main>
